<div class="flex items-center justify-between h-full px-4 lg:px-6">

    <a href="index.html" class="flex items-center">

    </a>

    <!-- Hamburger Menu (Desktop) -->
    <button
      id="desktop-sidebar-toggle"
      class="hidden lg:block text-red-600 hover:text-red-700 transition-colors focus:outline-none"
    >
      <svg
        width="28"
        height="28"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M3 12H20"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <path
          d="M3 6H23"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <path
          d="M3 18H15"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </button>

    <!-- Hamburger Menu (Mobile) -->
    <button
      id="sidebar-toggle"
      class="lg:hidden text-red-600 hover:text-red-700 transition-colors focus:outline-none"
    >
      <i class="ph ph-list text-2xl"></i>
    </button>
  </div>

  <!-- Right Section -->
  <div class="flex items-center gap-3 lg:gap-5">
    <!-- Grid Icon -->
    <!-- <button
      class="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition-colors focus:outline-none"
    >
       <img src="assets/images/grid.svg" alt="Grid" class="h-5 w-5" />
    </button> -->

    <!-- Notification -->
    <button
      class="relative p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition-colors focus:outline-none"
    >
      <!-- <i class="ph ph-bell text-xl"></i> -->
       <img src="assets/images/notification-bing.svg" alt="Notification" class="h-5 w-5" />
      <span
        class="absolute top-2 right-2.5 block h-1.5 w-1.5 rounded-full bg-red-500 ring-2 ring-white"

    </button>

    <!-- Reports Button -->
    <!-- <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-md text-sm font-medium transition-colors hidden md:block">
      Reports
    </button> -->

    <!-- User Profile -->
    <div class="relative ml-2 pl-2 border-l border-gray-200">
      <button id="user-menu-button" class="flex items-center gap-2 focus:outline-none group">
        <img
          class="h-8 w-8 rounded-full object-cover ring-2 ring-transparent group-hover:ring-gray-200 transition-all"
          src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
          alt="User avatar"
        />
        <span class="text-sm font-medium text-gray-700 hidden sm:block">Rahul Dubey</span>
        <i
          class="ph ph-caret-down text-gray-400 group-hover:text-gray-600 text-xs transition-colors"
        ></i>
      </button>

      <!-- Dropdown Menu -->
      <div

        class="absolute right-0 mt-2 w-52 bg-white rounded-lg shadow-xl border border-gray-100 py-2 hidden z-50 transform origin-top-right transition-all duration-200"

        <a

          class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors group/item"

          <i class="ph ph-user text-lg text-gray-500 group-hover/item:text-gray-900"></i>
          <span>View Profile</span>
        </a>
        <a
          href="contact-us.html"
          class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors group/item"
        >
          <i class="ph ph-envelope text-lg text-gray-500 group-hover/item:text-gray-900"></i>
          <span>Contact Us</span>
        </a>
        <a
          href="settings.html"
          class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors group/item"

          <i class="ph ph-gear text-lg text-gray-500 group-hover/item:text-gray-900"></i>

        </a>
        <a
          href="change-password.html"

          <span>My Email Settings</span>
        </a>
        <div class="my-1 border-t border-gray-100"></div>
        <a
          href="login.html"
          class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors group/item"
        >
          <i class="ph ph-sign-out text-lg text-gray-500 group-hover/item:text-gray-900"></i>
          <span>Logout</span>
        </a>
      </div>
