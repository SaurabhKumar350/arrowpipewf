<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password - Arrow Pipes</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="bg-[#EDF1F2] text-gray-800">
    <!-- Header -->
    <header
      id="header-container"
      data-include="includes/header.html"
      class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-gray-200 h-16"
    ></header>

    <div class="flex h-screen pt-16">
      <!-- Sidebar -->
      <aside
        id="sidebar"
        class="fixed left-0 top-16 bottom-0 w-72 bg-white border-r border-gray-200 z-40 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 overflow-y-auto"
        data-include="includes/sidebar.html"
      ></aside>

      <!-- Mobile Overlay -->
      <div
        id="sidebar-overlay"
        class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden glass"
      ></div>

      <!-- Main Content -->
      <main
        id="main-content"
        class="flex-1 lg:ml-72 p-4 md:p-8 bg-[#F2F2F2] min-h-[calc(100vh-64px)] transition-all duration-300"
      >
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 md:p-8 max-w-2xl mx-auto">
          <h2 class="text-xl font-bold text-gray-800 mb-8 flex items-center gap-2">
            Change Password
          </h2>
          
          <form class="space-y-6">
            <!-- Current Password -->
            <div>
              <label for="current-password" class="block text-sm font-medium text-gray-700 mb-2">
                Current Password <span class="text-red-500">*</span>
              </label>
              <div class="relative">
                <input
                  type="password"
                  id="current-password"
                  placeholder="Enter current password"
                  class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors placeholder-gray-400"
                  required
                />
                <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none" onclick="togglePassword('current-password', this)">
                  <i class="ph ph-eye-slash text-xl"></i>
                </button>
              </div>
            </div>

            <!-- New Password -->
            <div>
              <label for="new-password" class="block text-sm font-medium text-gray-700 mb-2">
                New Password <span class="text-red-500">*</span>
              </label>
              <div class="relative">
                <input
                  type="password"
                  id="new-password"
                  placeholder="Enter new password"
                  class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors placeholder-gray-400"
                  required
                />
                <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none" onclick="togglePassword('new-password', this)">
                  <i class="ph ph-eye-slash text-xl"></i>
                </button>
              </div>
              <p class="mt-1 text-xs text-gray-500">
                Password must be at least 8 characters long and include a mix of letters, numbers, and symbols.
              </p>
            </div>

            <!-- Confirm New Password -->
            <div>
              <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-2">
                Confirm New Password <span class="text-red-500">*</span>
              </label>
              <div class="relative">
                <input
                  type="password"
                  id="confirm-password"
                  placeholder="Confirm new password"
                  class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors placeholder-gray-400"
                  required
                />
                <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none" onclick="togglePassword('confirm-password', this)">
                  <i class="ph ph-eye-slash text-xl"></i>
                </button>
              </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex items-center gap-3 pt-4">
              <button
                type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-6 rounded-md transition-colors shadow-sm"
              >
                Update Password
              </button>
              <button
                type="button"
                class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2.5 px-6 rounded-md transition-colors shadow-sm border border-gray-300"
                onclick="window.history.back()"
              >
                Cancel
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <!-- Scripts -->
    <script src="assets/js/include.js"></script>
    <script src="assets/js/script.js"></script>
    <script>
      function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('i');
        
        if (input.type === 'password') {
          input.type = 'text';
          icon.classList.remove('ph-eye-slash');
          icon.classList.add('ph-eye');
        } else {
          input.type = 'password';
          icon.classList.remove('ph-eye');
          icon.classList.add('ph-eye-slash');
        }
      }
    </script>
  </body>
</html>
