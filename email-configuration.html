<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Configuration - Arrow Pipes</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="bg-[#EDF1F2] text-gray-800">
    <!-- Header -->
    <header
      id="header-container"
      data-include="includes/header.html"
      class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-gray-200 h-16"
    ></header>

    <div class="flex h-screen pt-16">
      <!-- Sidebar -->
      <aside
        id="sidebar"
        class="fixed left-0 top-16 bottom-0 w-72 bg-white border-r border-gray-200 z-40 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 overflow-y-auto"
        data-include="includes/sidebar.html"
      ></aside>

      <!-- Mobile Overlay -->
      <div
        id="sidebar-overlay"
        class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden glass"
      ></div>

      <!-- Main Content -->
      <main
        id="main-content"
        class="flex-1 lg:ml-72 p-4 md:p-8 bg-[#F2F2F2] min-h-[calc(100vh-64px)] transition-all duration-300"
      >
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 md:p-8">
          <h2 class="text-xl font-bold text-gray-800 mb-8 flex items-center gap-2">
            Company Details <span class="text-gray-400 font-normal">| cylsys</span>
          </h2>
          
          <form class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-x-12 md:gap-y-8">
              
              <!-- Name -->
              <div>
                <label for="name" class="block text-sm font-medium text-gray-700 mb-2">
                  Name <span class="text-red-500">*</span>
                </label>
                <input
                  type="text"
                  id="name"
                  placeholder="Display Name"
                  class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors placeholder-gray-400"
                  required
                />
              </div>

              <!-- Account Type -->
              <div>
                <label for="account-type" class="block text-sm font-medium text-gray-700 mb-2">
                  Account Type <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                  <select
                    id="account-type"
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors appearance-none bg-white text-gray-700"
                    required
                  >
                    <option value="Exchange">Exchange</option>
                    <option value="Gmail">Gmail</option>
                    <option value="Outlook">Outlook</option>
                    <option value="Other">Other</option>
                  </select>
                  <i class="ph ph-caret-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none"></i>
                </div>
              </div>

              <!-- Email ID -->
              <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                  Email ID <span class="text-red-500">*</span>
                </label>
                <input
                  type="email"
                  id="email"
                  placeholder="Email ID"
                  class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors placeholder-gray-400"
                  required
                />
              </div>

              <!-- Email Password -->
              <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                  Email Password <span class="text-red-500">*</span>
                </label>
                <input
                  type="password"
                  id="password"
                  placeholder="Password for Email"
                  class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors placeholder-gray-400"
                  required
                />
              </div>

              <!-- Port Number -->
              <div>
                <label for="port" class="block text-sm font-medium text-gray-700 mb-2">
                  Port Number <span class="text-red-500">*</span>
                </label>
                <input
                  type="number"
                  id="port"
                  placeholder="0"
                  class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors placeholder-gray-400"
                  required
                />
              </div>

              <!-- Server -->
              <div>
                <label for="server" class="block text-sm font-medium text-gray-700 mb-2">
                  Server <span class="text-red-500">*</span>
                </label>
                <input
                  type="text"
                  id="server"
                  placeholder="Server details"
                  class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors placeholder-gray-400"
                  required
                />
              </div>

            </div>

            <!-- Action Buttons -->
            <div class="flex items-center gap-3 pt-4">
              <button
                type="submit"
                class="bg-[#E60002] hover:bg-[#E60002]/90 text-white font-medium py-2.5 px-6 rounded-md transition-colors shadow-sm"
              >
                Save Email Settings
              </button>
              <button
                type="button"
                class="bg-white hover:bg-white border-gray-300 font-medium py-2.5 px-6 rounded-md transition-colors shadow-sm"
                onclick="window.history.back()"
              >
                Cancel
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <!-- Scripts -->
    <script src="assets/js/include.js"></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>
