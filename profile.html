<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile - Arrow Pipes</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="bg-[#EDF1F2] text-gray-800">
    <!-- Header -->
    <header
      id="header-container"
      data-include="includes/header.html"
      class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-gray-200 h-16"
    ></header>

    <div class="flex h-screen pt-16">
      <!-- Sidebar -->
      <aside
        id="sidebar"
        class="fixed left-0 top-16 bottom-0 w-72 bg-white border-r border-gray-200 z-40 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 overflow-y-auto"
        data-include="includes/sidebar.html"
      ></aside>

      <!-- Mobile Overlay -->
      <div
        id="sidebar-overlay"
        class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden glass"
      ></div>

      <!-- Main Content -->
      <main
        id="main-content"
        class="flex-1 lg:ml-72 p-4 md:p-8 bg-[#F2F2F2] min-h-[calc(100vh-64px)] transition-all duration-300"
      >
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 md:p-8 max-w-4xl mx-auto">
          <h2 class="text-xl font-bold text-gray-800 mb-8 flex items-center gap-2">
            My Profile
          </h2>
          
          <form class="space-y-8">
            <!-- Profile Picture -->
            <div class="flex flex-col items-center sm:items-start">
              <label class="block text-sm font-medium text-gray-700 mb-4">Profile Picture</label>
              <div class="relative group">
                <img
                  src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
                  alt="Profile"
                  class="h-24 w-24 rounded-full object-cover ring-4 ring-gray-50"
                  id="profile-image"
                />
                <button
                  type="button"
                  class="absolute bottom-0 right-0 bg-[#E60002] hover:bg-[#cc0002] text-white p-1.5 rounded-full shadow-md transition-colors"
                  onclick="document.getElementById('avatar-upload').click()"
                >
                  <i class="ph ph-camera text-lg"></i>
                </button>
                <input 
                  type="file" 
                  id="avatar-upload" 
                  class="hidden" 
                  accept="image/*"
                  onchange="const file = this.files[0]; if(file){ const reader = new FileReader(); reader.onload = e => document.getElementById('profile-image').src = e.target.result; reader.readAsDataURL(file); }"
                />
              </div>
            </div>

            <!-- Personal Details -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-x-12 md:gap-y-8">
              
              <!-- First Name -->
              <div>
                <label for="first-name" class="block text-sm font-medium text-gray-700 mb-2">
                  First Name <span class="text-red-500">*</span>
                </label>
                <input
                  type="text"
                  id="first-name"
                  value="Rahul"
                  class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-[#E60002] focus:ring-1 focus:ring-[#E60002] outline-none transition-colors placeholder-gray-400"
                  required
                />
              </div>

              <!-- Last Name -->
              <div>
                <label for="last-name" class="block text-sm font-medium text-gray-700 mb-2">
                  Last Name <span class="text-red-500">*</span>
                </label>
                <input
                  type="text"
                  id="last-name"
                  value="Dubey"
                  class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-[#E60002] focus:ring-1 focus:ring-[#E60002] outline-none transition-colors placeholder-gray-400"
                  required
                />
              </div>

              <!-- Email ID -->
              <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                  Email ID <span class="text-red-500">*</span>
                </label>
                <input
                  type="email"
                  id="email"
                  value="rahul.dubey@example.com"
                  class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-[#E60002] focus:ring-1 focus:ring-[#E60002] outline-none transition-colors placeholder-gray-400 bg-gray-50"
                  readonly
                />
                <p class="mt-1 text-xs text-gray-500">Email address cannot be changed.</p>
              </div>

              <!-- Phone Number -->
              <div>
                <label for="phone" class="block text-sm font-medium text-gray-700 mb-2">
                  Phone Number
                </label>
                <input
                  type="tel"
                  id="phone"
                  value="+91 98765 43210"
                  class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-[#E60002] focus:ring-1 focus:ring-[#E60002] outline-none transition-colors placeholder-gray-400"
                />
              </div>

              <!-- Designation -->
              <div>
                <label for="designation" class="block text-sm font-medium text-gray-700 mb-2">
                  Designation
                </label>
                <input
                  type="text"
                  id="designation"
                  value="Sales Manager"
                  class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-[#E60002] focus:ring-1 focus:ring-[#E60002] outline-none transition-colors placeholder-gray-400"
                />
              </div>

              <!-- Location -->
              <div>
                <label for="location" class="block text-sm font-medium text-gray-700 mb-2">
                  Location
                </label>
                <input
                  type="text"
                  id="location"
                  value="Mumbai, India"
                  class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-[#E60002] focus:ring-1 focus:ring-[#E60002] outline-none transition-colors placeholder-gray-400"
                />
              </div>

            </div>

            <!-- Action Buttons -->
            <div class="flex items-center gap-3 pt-4 border-t border-gray-100 mt-8">
              <button
                type="submit"
                class="bg-[#E60002] hover:bg-[#cc0002] text-white font-medium py-2.5 px-6 rounded-md transition-colors shadow-sm"
              >
                Save Changes
              </button>
              <button
                type="button"
                class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2.5 px-6 rounded-md transition-colors shadow-sm border border-gray-300"
                onclick="window.history.back()"
              >
                Cancel
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <!-- Scripts -->
    <script src="assets/js/include.js"></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>
