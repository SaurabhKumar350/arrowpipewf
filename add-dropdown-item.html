<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Drop Down Item - Arrow Pipes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="bg-[#EDF1F2] text-gray-800">
    <header
      id="header-container"
      data-include="includes/header.html"
      class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-gray-200 h-16"
    ></header>

    <div class="flex h-screen pt-16">
      <aside
        id="sidebar"
        class="fixed left-0 top-16 bottom-0 w-72 bg-white border-r border-gray-200 z-40 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 overflow-y-auto"
        data-include="includes/sidebar.html"
      ></aside>

      <div
        id="sidebar-overlay"
        class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden glass"
      ></div>

      <main
        id="main-content"
        class="flex-1 lg:ml-72 p-4 md:p-6 bg-[#F2F2F2] min-h-[calc(100vh-64px)] transition-all duration-300"
      >
        <div class="bg-white rounded-[20px] shadow-sm border border-gray-300 p-6 md:p-8">
            <h1 class="text-xl font-semibold text-gray-900 mb-6">Drop Down Master</h1>
            
            <form action="#" method="POST" class="max-w-4xl">
                <!-- Category -->
                <div class="mb-6">
                    <label for="category" class="block text-sm font-medium text-gray-700 mb-1">Category <span class="text-[#E60002]">*</span></label>
                    <div class="relative">
                        <select id="category" name="category" class="w-full appearance-none bg-white border border-gray-300 rounded-lg px-3 py-2.5 pr-9 text-sm text-gray-700 focus:outline-none focus:border-[#E60002] focus:ring-1 focus:ring-[#E60002]">
                            <option value="" disabled selected>Category</option>
                            <option value="lead-action">Lead Action</option>
                            <option value="lead-stage">Lead Stage</option>
                            <option value="mail-action">Mail Action</option>
                        </select>
                         <i class="ph ph-caret-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none text-lg"></i>
                    </div>
                </div>

                <!-- Name -->
                <div class="mb-6">
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                    <input type="text" id="name" name="name" placeholder="Name" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm text-gray-700 focus:outline-none focus:border-[#E60002] focus:ring-1 focus:ring-[#E60002]">
                </div>

                <!-- Set as Default -->
                <div class="mb-8">
                    <label for="is_default" class="block text-sm font-medium text-gray-700 mb-1">Set as Default <span class="text-[#E60002]">*</span></label>
                    <div class="relative">
                        <select id="is_default" name="is_default" class="w-full appearance-none bg-white border border-gray-300 rounded-lg px-3 py-2.5 pr-9 text-sm text-gray-700 focus:outline-none focus:border-[#E60002] focus:ring-1 focus:ring-[#E60002]">
                            <option value="no" selected>No</option>
                            <option value="yes">Yes</option>
                        </select>
                         <i class="ph ph-caret-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none text-lg"></i>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="flex flex-wrap gap-3">
                    <button type="submit" class="px-6 py-2 bg-[#E60002] hover:bg-[#E60002]/90 text-white text-sm font-medium rounded-md transition-colors shadow-sm">Add</button>
                    <button type="button" class="px-6 py-2 bg-[#E60002] hover:bg-[#E60002]/90 text-white text-sm font-medium rounded-md transition-colors shadow-sm">Save and New</button>
                    <a href="dropdown-master.html" class="px-6 py-2 bg-white hover:bg-[#F2F2F2] border border-gray-300 text-sm font-medium rounded-md transition-colors shadow-sm text-center">Cancel</a>
                </div>
            </form>
        </div>
      </main>
    </div>

    <script src="assets/js/include.js"></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>
