<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arrow Pipes - TAT Reports</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="bg-[#EDF1F2] text-gray-800">
    <header
      id="header-container"
      data-include="includes/header.html"
      class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-gray-200 h-16"
    ></header>

    <div class="flex h-screen pt-16">
      <aside
        id="sidebar"
        class="fixed left-0 top-16 bottom-0 w-72 bg-white border-r border-gray-200 z-40 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 overflow-y-auto"
        data-include="includes/sidebar.html"
      ></aside>

      <div
        id="sidebar-overlay"
        class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden glass"
      ></div>

      <main
        id="main-content"
        class="flex-1 lg:ml-72 p-4 md:p-3 bg-[#F2F2F2] min-h-[calc(100vh-64px)] transition-all duration-300 flex flex-col gap-4 overflow-x-hidden"
      >
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
          <div class="flex items-center gap-2">
            <h1 class="text-lg md:text-xl font-bold text-gray-800">TAT Reports</h1>
          </div>
          <div class="flex items-center gap-2">
            <div class="relative">
              <i class="ph ph-calendar-blank absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
              <input type="date" class="w-36 pl-9 pr-3 py-2 bg-[#F9FAFB] border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-red-500" />
            </div>
            <span class="text-gray-500 text-sm">to</span>
            <div class="relative">
              <i class="ph ph-calendar-blank absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
              <input type="date" class="w-36 pl-9 pr-3 py-2 bg-[#F9FAFB] border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-red-500" />
            </div>
            <select class="w-40 py-2 bg-[#F9FAFB] border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-red-500">
              <option value="overall">Overall</option>
              <option value="enquiry">Enquiry</option>
              <option value="order">Order</option>
            </select>
            <div class="relative">
              <button
                data-dropdown-toggle="report-download-dropdown"
                class="flex items-center gap-2 px-3 h-10 text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors"
              >
                <i class="ph ph-download-simple text-lg"></i>
                <span class="text-sm">Export</span>
                <i class="ph ph-caret-down text-xs"></i>
              </button>
              <div
                id="report-download-dropdown"
                class="dropdown-menu absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-100 py-1 hidden z-30"
              >
                <a href="#" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
                  <i class="ph ph-file-pdf text-lg text-red-500"></i>
                  PDF
                </a>
                <a href="#" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
                  <i class="ph ph-file-csv text-lg text-green-600"></i>
                  CSV
                </a>
                <a href="#" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
                  <i class="ph ph-microsoft-excel-logo text-lg text-green-600"></i>
                  Excel
                </a>
              </div>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">
          <div class="bg-white border border-gray-200 rounded-xl p-4 flex flex-col gap-2">
            <div class="flex items-center justify-between">
              <span class="text-sm text-gray-500">Avg TAT (Enquiry)</span>
              <i class="ph ph-timer text-gray-400"></i>
            </div>
            <div class="text-2xl font-bold text-gray-900">2.8 days</div>
            <div class="text-xs text-green-600 font-medium">-0.2 days</div>
          </div>
          <div class="bg-white border border-gray-200 rounded-xl p-4 flex flex-col gap-2">
            <div class="flex items-center justify-between">
              <span class="text-sm text-gray-500">Avg TAT (Order)</span>
              <i class="ph ph-timer text-gray-400"></i>
            </div>
            <div class="text-2xl font-bold text-gray-900">3.6 days</div>
            <div class="text-xs text-gray-600 font-medium">+0.1 days</div>
          </div>
          <div class="bg-white border border-gray-200 rounded-xl p-4 flex flex-col gap-2">
            <div class="flex items-center justify-between">
              <span class="text-sm text-gray-500">95th Percentile</span>
              <i class="ph ph-timer text-gray-400"></i>
            </div>
            <div class="text-2xl font-bold text-gray-900">6.8 days</div>
            <div class="text-xs text-gray-600 font-medium">-</div>
          </div>
          <div class="bg-white border border-gray-200 rounded-xl p-4 flex flex-col gap-2">
            <div class="flex items-center justify-between">
              <span class="text-sm text-gray-500">SLA Breaches</span>
              <i class="ph ph-warning text-gray-400"></i>
            </div>
            <div class="text-2xl font-bold text-gray-900">12</div>
            <div class="text-xs text-red-600 font-medium">-1</div>
          </div>
        </div>

        <div class="bg-white border border-gray-200 rounded-xl overflow-hidden">
          <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
            <div class="text-sm font-semibold text-gray-800">TAT Breakdown</div>
            <div class="flex items-center gap-2">
              <div class="relative w-64">
                <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                <input type="text" placeholder="Search" class="w-full pl-9 pr-3 py-2 bg-white border border-gray-200 rounded text-sm focus:outline-none focus:ring-1 focus:ring-red-500 placeholder-gray-400">
              </div>
              <select class="py-2 bg-white border border-gray-200 rounded text-sm focus:outline-none focus:ring-1 focus:ring-red-500">
                <option>All</option>
                <option>Enquiry</option>
                <option>Order</option>
              </select>
            </div>
          </div>
          <table class="min-w-full bg-white">
            <thead>
              <tr class="bg-gray-50">
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500">Process</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500">Avg</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500">95th</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500">SLA</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
              <tr>
                <td class="px-6 py-4 text-sm text-gray-900">Enquiry Triage</td>
                <td class="px-6 py-4 text-sm text-gray-700">0.5 days</td>
                <td class="px-6 py-4 text-sm text-gray-700">1.2 days</td>
                <td class="px-6 py-4 text-sm text-gray-700">1 day</td>
              </tr>
              <tr>
                <td class="px-6 py-4 text-sm text-gray-900">Quotation</td>
                <td class="px-6 py-4 text-sm text-gray-700">1.4 days</td>
                <td class="px-6 py-4 text-sm text-gray-700">3.2 days</td>
                <td class="px-6 py-4 text-sm text-gray-700">2 days</td>
              </tr>
            </tbody>
          </table>
          <div class="px-6 py-4 bg-white border-t border-gray-200 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-6 text-[13px] text-gray-500 font-medium">
              <div class="flex items-center gap-2">
                <span>Rows per page:</span>
                <div class="relative">
                  <select class="appearance-none bg-gray-50 border border-gray-200 rounded-lg px-3 py-1 pr-8 focus:outline-none focus:ring-1 focus:ring-red-500 cursor-pointer text-gray-900 font-bold text-xs">
                    <option>10</option>
                    <option>20</option>
                    <option>50</option>
                  </select>
                  <i class="ph ph-caret-down absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none text-[10px]"></i>
                </div>
              </div>
              <span>1-10 of 28</span>
            </div>
            <div class="flex items-center gap-1.5">
              <button class="w-8 h-8 flex items-center justify-center rounded-lg bg-[#E60004] text-white font-bold text-xs shadow-sm shadow-red-200">1</button>
              <button class="w-8 h-8 flex items-center justify-center rounded-lg bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 text-xs font-semibold transition-colors">2</button>
              <button class="w-8 h-8 flex items-center justify-center rounded-lg bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 text-xs font-semibold transition-colors">3</button>
              <button class="w-8 h-8 flex items-center justify-center rounded-lg bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 text-xs font-semibold transition-colors">4</button>
              <button class="w-8 h-8 flex items-center justify-center rounded-lg bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors">
                <i class="ph ph-caret-right font-bold"></i>
              </button>
              <button class="w-8 h-8 flex items-center justify-center rounded-lg bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors">
                <i class="ph ph-caret-double-right font-bold"></i>
              </button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="assets/js/include.js"></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>
