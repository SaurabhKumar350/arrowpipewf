<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roles & Privileges - Arrow Pipes</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="bg-[#EDF1F2] text-gray-800">
    <!-- Header -->
    <header
      id="header-container"
      data-include="includes/header.html"
      class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-gray-200 h-16"
    ></header>

    <div class="flex h-screen pt-16">
      <!-- Sidebar -->
      <aside
        id="sidebar"
        class="fixed left-0 top-16 bottom-0 w-72 bg-white border-r border-gray-200 z-40 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 overflow-y-auto"
        data-include="includes/sidebar.html"
      ></aside>

      <!-- Mobile Overlay -->
      <div
        id="sidebar-overlay"
        class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden glass"
      ></div>

      <!-- Main Content -->
      <main
        id="main-content"
        class="flex-1 lg:ml-72 p-4 md:p-6 bg-[#F2F2F2] min-h-[calc(100vh-64px)] transition-all duration-300"
      >
        <div class="bg-white rounded-[20px] shadow-sm border border-gray-300">
          <!-- Header Controls -->
          <div
            class="p-4 border-b border-gray-300 flex flex-col sm:flex-row justify-end items-center gap-4"
          >
            <div class="flex items-center gap-4 w-full sm:w-auto">
              <!-- Search -->
              <div class="relative w-full sm:w-64">
                <input
                  type="text"
                  placeholder="Search..."
                  class="w-full pl-3 pr-10 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-[#E60002] focus:ring-1 focus:ring-[#E60002]"
                />
                <button
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
                >
                  <i class="ph ph-magnifying-glass text-lg"></i>
                </button>
              </div>

              <!-- Add Role Button -->
                <a
                    href="add-role.html"
                    class="relative group bg-[#E60002] hover:bg-[#E60002]/90 text-white p-2 rounded-full transition-colors flex items-center justify-center"
                >
                <i class="ph ph-plus"></i>
                <!-- Custom Tooltip -->
                <span
                  class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-2.5 py-1 text-xs font-medium text-white bg-gray-900 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none shadow-sm z-10"
                >
                  Add Role
                  <span
                    class="absolute top-full left-1/2 -translate-x-1/2 -mt-0.5 border-4 border-transparent border-t-gray-900"
                  ></span>
                </span>
              </a>
            </div>
          </div>

          <!-- Table -->
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr
                  class="text-left text-gray-900 font-semibold border-b border-gray-300 bg-gray-50"
                >
                  <th class="py-4 px-4 w-[120px]">
                    <div
                      class="flex items-center gap-1 cursor-pointer hover:text-gray-700"
                    >
                      Action
                      <div
                        class="flex flex-col text-[10px] leading-none text-gray-400"
                      >
                        <i class="ph-fill ph-caret-up"></i>
                        <i class="ph-fill ph-caret-down"></i>
                      </div>
                    </div>
                  </th>
                  <th class="py-4 px-4">
                    <div
                      class="flex items-center gap-1 cursor-pointer hover:text-gray-700"
                    >
                      Role Name
                      <div
                        class="flex flex-col text-[10px] leading-none text-gray-400"
                      >
                        <i class="ph-fill ph-caret-up"></i>
                        <i class="ph-fill ph-caret-down"></i>
                      </div>
                    </div>
                  </th>
                  <th class="py-4 px-4">
                    <div
                      class="flex items-center gap-1 cursor-pointer hover:text-gray-700"
                    >
                      Role Description
                      <div
                        class="flex flex-col text-[10px] leading-none text-gray-400"
                      >
                        <i class="ph-fill ph-caret-up"></i>
                        <i class="ph-fill ph-caret-down"></i>
                      </div>
                    </div>
                  </th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-100">
                <!-- Row 1 -->
                 <tr class="hover:bg-gray-50 transition-colors">
                  <td class="py-3 px-4">
                    <div class="flex items-center gap-3">
                      <button
                        class="text-[#E60002] hover:text-[#E60002]/80 p-1 border border-red-200 rounded hover:bg-red-50"
                      >
                        <i class="ph ph-pencil-simple"></i>
                      </button>
                      <label
                        class="relative inline-flex items-center cursor-pointer"
                      >
                        <input
                          type="checkbox"
                          value=""
                          class="sr-only peer"
                          checked
                        />
                        <div
                          class="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-[#E60002]"
                        ></div>
                      </label>
                    </div>
                  </td>
                  <td class="py-3 px-4">
                    <a
                      href="#"
                      class="font-medium text-gray-900 hover:text-[#E60002] transition-colors"
                      >Admin</a
                    >
                  </td>
                  <td class="py-3 px-4 text-gray-600">Admin</td>
                </tr>
                <!-- Row 2 -->
                <tr class="hover:bg-gray-50 transition-colors">
                  <td class="py-3 px-4">
                    <div class="flex items-center gap-3">
                      <button
                        class="text-[#E60002] hover:text-[#E60002]/80 p-1 border border-red-200 rounded hover:bg-red-50"
                      >
                        <i class="ph ph-pencil-simple"></i>
                      </button>
                      <label
                        class="relative inline-flex items-center cursor-pointer"
                      >
                        <input
                          type="checkbox"
                          value=""
                          class="sr-only peer"
                          checked
                        />
                        <div
                          class="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-[#E60002]"
                        ></div>
                      </label>
                    </div>
                  </td>
                  <td class="py-3 px-4">
                    <a
                      href="#"
                      class="font-medium text-gray-900 hover:text-[#E60002] transition-colors"
                      >Sales Team</a
                    >
                  </td>
                  <td class="py-3 px-4 text-gray-600">
                   Sales Team
                  </td>
                </tr>
                
                
              </tbody>
            </table>
          </div>

          <!-- Footer Pagination -->
          <div
            class="px-6 py-4 bg-white border-t border-gray-300 flex flex-col sm:flex-row items-center justify-between gap-4"
          >
            <div
              class="flex items-center gap-6 text-[13px] text-gray-500 font-medium"
            >
              <div class="flex items-center gap-2">
                <span>Rows per page:</span>
                <div class="relative">
                  <select
                    class="appearance-none bg-gray-50 border border-gray-200 rounded-lg px-3 py-1 pr-8 focus:outline-none focus:ring-1 focus:ring-red-500 cursor-pointer text-gray-900 font-bold text-xs"
                  >
                    <option>10</option>
                    <option>25</option>
                    <option>50</option>
                    <option>100</option>
                  </select>
                  <i
                    class="ph ph-caret-down absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none text-[10px]"
                  ></i>
                </div>
              </div>
              <span>1-5 of 5</span>
            </div>
            <div class="flex items-center gap-1.5">
              <button
                class="w-8 h-8 flex items-center justify-center rounded-lg bg-[#E60004] text-white font-bold text-xs shadow-sm shadow-red-200"
              >
                1
              </button>
              <button
                class="w-8 h-8 flex items-center justify-center rounded-lg bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors"
              >
                <i class="ph ph-caret-right font-bold"></i>
              </button>
              <button
                class="w-8 h-8 flex items-center justify-center rounded-lg bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors"
              >
                <i class="ph ph-caret-double-right font-bold"></i>
              </button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Scripts -->
    <script src="assets/js/include.js"></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>
