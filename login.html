<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Arrow Pipes</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
    <style>
      /* Custom wave shape */
      .wave-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 10;
        pointer-events: none;
      }
      .wave-path {
        fill: #E60002;
      }
      
      /* Input autofill styling fix for transparent inputs */
      input:-webkit-autofill,
      input:-webkit-autofill:hover, 
      input:-webkit-autofill:focus, 
      input:-webkit-autofill:active{
          -webkit-box-shadow: 0 0 0 30px rgba(0,0,0,0.6) inset !important;
          -webkit-text-fill-color: white !important;
          transition: background-color 5000s ease-in-out 0s;
      }
    </style>
  </head>
  <body class="bg-gray-900 min-h-screen relative overflow-hidden flex items-center justify-center font-sans">
    
    <!-- Background Image with Overlay -->
    <div class="absolute inset-0 z-0">
      <!-- Using local background image -->
      <img src="assets/images/login-bg.avif" alt="Background" class="w-full h-full opacity-100">
      <div class="absolute inset-0 bg-black/60"></div>
    </div>

    <!-- Red Wave Graphic -->
    <!-- <div class="wave-container hidden md:block">
      <svg viewBox="0 0 1440 1024" fill="none" xmlns="http://www.w3.org/2000/svg" class="h-full w-full absolute left-0 top-0" preserveAspectRatio="none">
        <path d="M0 0H800C800 0 850 200 450 350C150 500 100 650 450 750C650 800 200 950 0 1024V0Z" class="wave-path" stroke="#FF4D4F" stroke-width="10"/>
      </svg>
    </div> -->

    <!-- Main Content -->
    <div class="relative z-20 w-full max-w-[450px] px-6 py-8">
      
      <!-- Logo -->
      <div class="flex justify-center mb-12">
        <!-- Using filter to make logo white text while keeping red (approximate) -->
        <img src="assets/images/login-logo.svg" alt="Arrow Pipes" class="h-20 w-auto filter drop-shadow-lg" />
      </div>

      <!-- Form -->
      <form action="index.html" class="space-y-6">
        
        <!-- Username -->
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <i class="ph ph-user text-gray-300 text-xl group-focus-within:text-white transition-colors"></i>
          </div>
          <input 
            type="text" 
            name="username" 
            placeholder="USERNAME" 
            class="w-full pl-12 pr-4 py-3 bg-transparent border border-gray-400 rounded text-white placeholder-gray-400 focus:outline-none focus:border-white focus:ring-1 focus:ring-white transition-all text-sm tracking-wide uppercase"
            
          >
        </div>

        <!-- Password -->
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <i class="ph ph-lock text-gray-300 text-xl group-focus-within:text-white transition-colors"></i>
          </div>
          <input 
            type="password" 
            name="password" 
            placeholder="PASSWORD" 
            class="w-full pl-12 pr-4 py-3 bg-transparent border border-gray-400 rounded text-white placeholder-gray-400 focus:outline-none focus:border-white focus:ring-1 focus:ring-white transition-all text-sm tracking-wide uppercase"
            
          >
        </div>

        <!-- Submit Button -->
        <button 
          type="submit" 
          class="w-full py-3 px-4 bg-[#E60002] hover:bg-[#ff1a1d] text-white font-bold text-sm tracking-wider rounded shadow-lg transform transition-all hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#E60002] focus:ring-offset-gray-900 uppercase mt-4"
        >
          Login
        </button>

      </form>
    </div>

  </body>
</html>
