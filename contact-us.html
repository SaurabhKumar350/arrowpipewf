<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - Arrow Pipes</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="bg-[#EDF1F2] text-gray-800">
    <!-- Header -->
    <header
      id="header-container"
      data-include="includes/header.html"
      class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-gray-200 h-16"
    ></header>

    <div class="flex h-screen pt-16">
      <!-- Sidebar -->
      <aside
        id="sidebar"
        class="fixed left-0 top-16 bottom-0 w-72 bg-white border-r border-gray-200 z-40 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 overflow-y-auto"
        data-include="includes/sidebar.html"
      ></aside>

      <!-- Mobile Overlay -->
      <div
        id="sidebar-overlay"
        class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden glass"
      ></div>

      <!-- Main Content -->
      <main
        id="main-content"
        class="flex-1 lg:ml-72 p-4 md:p-8 bg-[#F2F2F2] min-h-[calc(100vh-64px)] transition-all duration-300"
      >
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 md:p-8 max-w-4xl mx-auto">
          
          <form class="space-y-6">
            <!-- How can we help you -->
            <div>
              <label for="message" class="block text-sm font-medium text-gray-700 mb-2">
                How can we help you <span class="text-red-500">*</span>
              </label>
              <textarea
                id="message"
                rows="4"
                placeholder="How can we help you"
                class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors resize-none placeholder-gray-400"
                required
              ></textarea>
            </div>

            <!-- Regarding -->
            <div>
              <label for="regarding" class="block text-sm font-medium text-gray-700 mb-2">
                Regarding <span class="text-red-500">*</span>
              </label>
              <div class="relative">
                <select
                  id="regarding"
                  class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors appearance-none bg-white text-gray-700"
                  required
                >
                  <option value="Want Demo">Want Demo</option>
                  <option value="Support">Support</option>
                  <option value="Sales">Sales</option>
                  <option value="Other">Other</option>
                </select>
                <i class="ph ph-caret-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none"></i>
              </div>
            </div>

            <!-- Attachment -->
            <div>
              <label for="attachment" class="block text-sm font-medium text-gray-700 mb-2">
                Attachment
              </label>
              <div class="flex rounded-lg border border-gray-300 overflow-hidden focus-within:ring-1 focus-within:ring-blue-500 focus-within:border-blue-500">
                <input
                  type="text"
                  readonly
                  placeholder="Attachment"
                  class="flex-1 px-4 py-3 outline-none text-gray-700 placeholder-gray-400 bg-white"
                  onclick="document.getElementById('file-upload').click()"
                />
                <input type="file" id="file-upload" class="hidden" onchange="this.previousElementSibling.value = this.files[0] ? this.files[0].name : ''" />
                <button
                  type="button"
                  onclick="document.getElementById('file-upload').click()"
                  class="px-6 py-3 bg-gray-100 text-gray-700 font-medium hover:bg-gray-200 transition-colors border-l border-gray-300"
                >
                  Browse
                </button>
              </div>
            </div>

            <!-- Mobile NO -->
            <div>
              <label for="mobile" class="block text-sm font-medium text-gray-700 mb-2">
                Mobile NO <span class="text-red-500">*</span>
              </label>
              <input
                type="tel"
                id="mobile"
                placeholder="Mobile No"
                class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors placeholder-gray-400"
                required
              />
            </div>

            <!-- Email ID -->
            <div>
              <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                Email ID <span class="text-red-500">*</span>
              </label>
              <input
                type="email"
                id="email"
                placeholder="Email ID"
                class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors placeholder-gray-400"
                required
              />
            </div>

            <!-- Convenient Date & Time -->
            <div>
              <label for="datetime" class="block text-sm font-medium text-gray-700 mb-2">
                Convenient Date & Time
              </label>
              <div class="relative">
                <input
                  type="datetime-local"
                  id="datetime"
                  class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-colors text-gray-700 placeholder-gray-400"
                />
              </div>
            </div>

            <!-- Submit Button -->
            <div class="pt-2">
              <button
                type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-8 rounded-md transition-colors shadow-sm"
              >
                Submit
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <!-- Scripts -->
    <script src="assets/js/include.js"></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>
