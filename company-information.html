<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Company Information - Arrow Pipes</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="bg-[#EDF1F2] text-gray-800">
    <!-- Header -->
    <header
      id="header-container"
      data-include="includes/header.html"
      class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-gray-200 h-16"
    ></header>

    <div class="flex h-screen pt-16">
      <!-- Sidebar -->
      <aside
        id="sidebar"
        class="fixed left-0 top-16 bottom-0 w-72 bg-white border-r border-gray-200 z-40 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 overflow-y-auto"
        data-include="includes/sidebar.html"
      ></aside>

      <!-- Mobile Overlay -->
      <div
        id="sidebar-overlay"
        class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden glass"
      ></div>

      <!-- Main Content -->
      <main
        id="main-content"
        class="flex-1 lg:ml-72 p-4 md:p-6 bg-[#F2F2F2] min-h-[calc(100vh-64px)] transition-all duration-300"
      >
        <div class="max-w-7xl mx-auto bg-white rounded-lg shadow-sm p-6">
          <h2 class="text-lg font-bold mb-6 text-gray-900">Company Details</h2>

          <form action="#" method="POST">
            <!-- Company Details Section -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
              <!-- Company Name -->
              <div>
                <label for="company_name" class="block text-sm font-medium text-gray-700 mb-1">Company Name <span class="text-red-500">*</span></label>
                <input type="text" id="company_name" name="company_name" value="cylsys" class="w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-md text-gray-900 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500" readonly>
              </div>

              <!-- Email -->
              <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email <span class="text-red-500">*</span></label>
                <input type="email" id="email" name="email" value="pawas.goyal@cylsys.com" class="w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-md text-gray-900 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500" readonly>
              </div>

              <!-- Contact Number -->
              <div>
                <label for="contact_number" class="block text-sm font-medium text-gray-700 mb-1">Contact Number</label>
                <input type="text" id="contact_number" name="contact_number" value="9967502429" class="w-full px-3 py-2 bg-white border border-gray-300 rounded-md text-gray-900 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500">
              </div>

              <!-- Fax Number -->
              <div>
                <label for="fax_number" class="block text-sm font-medium text-gray-700 mb-1">Fax Number</label>
                <input type="text" id="fax_number" name="fax_number" value="12345" class="w-full px-3 py-2 bg-white border border-gray-300 rounded-md text-gray-900 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500">
              </div>

              <!-- POC -->
              <div>
                <label for="poc" class="block text-sm font-medium text-gray-700 mb-1">POC</label>
                <input type="text" id="poc" name="poc" value="121" class="w-full px-3 py-2 bg-white border border-gray-300 rounded-md text-gray-900 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500">
              </div>

              <!-- Industry Type -->
              <div>
                <label for="industry_type" class="block text-sm font-medium text-gray-700 mb-1">Industry Type <span class="text-red-500">*</span></label>
                <select id="industry_type" name="industry_type" class="w-full px-3 py-2 bg-white border border-gray-300 rounded-md text-gray-900 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23007CB2%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-[length:0.7em] bg-no-repeat bg-[right_0.7em_center]">
                  <option value="IT" selected>IT</option>
                  <option value="Manufacturing">Manufacturing</option>
                  <option value="Services">Services</option>
                </select>
              </div>

              <!-- About -->
              <div>
                <label for="about" class="block text-sm font-medium text-gray-700 mb-1">About</label>
                <input type="text" id="about" name="about" value="sdsds" class="w-full px-3 py-2 bg-white border border-gray-300 rounded-md text-gray-900 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500">
              </div>

              <!-- Website -->
              <div>
                <label for="website" class="block text-sm font-medium text-gray-700 mb-1">Website</label>
                <input type="text" id="website" name="website" value="xyz.in" class="w-full px-3 py-2 bg-white border border-gray-300 rounded-md text-gray-900 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500">
              </div>
            </div>

            <!-- Address Information Section -->
            <h3 class="text-md font-bold mb-4 text-gray-900">Address Information</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 border-t border-gray-200 pt-6">
              <!-- Country -->
              <div>
                <label for="country" class="block text-sm font-medium text-gray-700 mb-1">Country <span class="text-red-500">*</span></label>
                <select id="country" name="country" class="w-full px-3 py-2 bg-white border border-gray-300 rounded-md text-gray-900 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23007CB2%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-[length:0.7em] bg-no-repeat bg-[right_0.7em_center]">
                  <option value="India" selected>India</option>
                  <option value="USA">USA</option>
                  <option value="UK">UK</option>
                </select>
              </div>

              <!-- State/Province -->
              <div>
                <label for="state" class="block text-sm font-medium text-gray-700 mb-1">State/Province <span class="text-red-500">*</span></label>
                <select id="state" name="state" class="w-full px-3 py-2 bg-white border border-gray-300 rounded-md text-gray-900 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23007CB2%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-[length:0.7em] bg-no-repeat bg-[right_0.7em_center]">
                  <option value="Uttar Pradesh [UP]" selected>Uttar Pradesh [UP]</option>
                  <option value="Delhi">Delhi</option>
                  <option value="Maharashtra">Maharashtra</option>
                </select>
              </div>

              <!-- City -->
              <div>
                <label for="city" class="block text-sm font-medium text-gray-700 mb-1">City <span class="text-red-500">*</span></label>
                <select id="city" name="city" class="w-full px-3 py-2 bg-white border border-gray-300 rounded-md text-gray-900 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23007CB2%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-[length:0.7em] bg-no-repeat bg-[right_0.7em_center]">
                  <option value="Barabanki" selected>Barabanki</option>
                  <option value="Lucknow">Lucknow</option>
                  <option value="Noida">Noida</option>
                </select>
              </div>

              <!-- Zip/Postal Code -->
              <div>
                <label for="zip" class="block text-sm font-medium text-gray-700 mb-1">Zip/Postal Code <span class="text-red-500">*</span></label>
                <input type="text" id="zip" name="zip" value="23232" class="w-full px-3 py-2 bg-white border border-gray-300 rounded-md text-gray-900 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500">
              </div>
            </div>

            <!-- Upload your Logo Section -->
            <h3 class="text-md font-bold mb-4 text-gray-900">Upload your Logo</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 border-t border-gray-200 pt-6">
              <!-- Upload Logo Input -->
              <div>
                <label for="logo" class="block text-sm font-medium text-gray-700 mb-1">Upload Logo</label>
                <div class="flex">
                  <input type="text" value="Logo" class="flex-1 px-3 py-2 bg-white border border-r-0 border-gray-300 rounded-l-md text-gray-900 focus:outline-none" readonly>
                  <label class="cursor-pointer bg-gray-100 border border-gray-300 border-l-0 rounded-r-md px-4 py-2 text-gray-700 hover:bg-gray-200">
                    Browse
                    <input type="file" id="logo" name="logo" class="hidden">
                  </label>
                </div>
              </div>

              <!-- Logo Preview -->
              <div class="flex items-center justify-start">
                 <!-- Placeholder for logo if image not available, or a default image -->
                 <div class="w-24 h-24 border border-gray-200 rounded-md p-1 flex items-center justify-center bg-white">
                    <!-- Using a generic icon or a placeholder image if specific one is not available -->
                    <i class="ph ph-image text-4xl text-gray-300"></i>
                    <!-- If I had the specific brain logo, I would link it here. For now, a placeholder is safer unless I find the asset. -->
                 </div>
              </div>
            </div>

            <!-- Buttons -->
            <div class="flex space-x-4 mt-8">
              <button type="submit" class="bg-[#E60002] hover:bg-[#E60002]/90 text-white font-medium py-2.5 px-6 rounded transition-colors">Save</button>
              <button type="button" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2.5 px-6 rounded transition-colors border border-gray-300" onclick="window.history.back()">Cancel</button>
            </div>

          </form>
        </div>
      </main>
    </div>

    <!-- Scripts -->
    <script src="assets/js/include.js"></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>
